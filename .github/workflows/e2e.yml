name: E2E

# The Playwright E2E suite runs against the PRODUCTION build (built dist served
# by the Bun server on a single origin — see scripts/e2e-prod.ts), which is what
# a real deploy serves and avoids the ~20s on-demand admin-shell compile that
# makes the dev-server run timeout-fragile.
#
# Manual-trigger only for now: the suite is being stabilized (a handful of specs
# still have environment/timing-sensitive failures), so it does not gate PRs
# yet. Once it is reliably green, add a `pull_request` trigger to make it a
# required check.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: bun run build
      - uses: actions/upload-artifact@v4
        with:
          name: e2e-dist
          path: dist
          retention-days: 1

  e2e:
    name: E2E shard ${{ matrix.shard }}/4
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      # Reuse the dist built once above; scripts/e2e-prod.ts skips its own build
      # when ./dist is present.
      - uses: actions/download-artifact@v4
        with:
          name: e2e-dist
          path: dist
      - run: bunx playwright install --with-deps chromium
      # Each shard runs a disjoint subset against its own fresh prod stack
      # (own DB + owner + persona). Parallelism is across runners; within a
      # shard the suite stays serial (workers:1) — the shared-stack design.
      - name: Run E2E (prod build)
        run: E2E_MODE=prod bunx playwright test --shard=${{ matrix.shard }}/4
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: .tmp/playwright-report
          retention-days: 7
