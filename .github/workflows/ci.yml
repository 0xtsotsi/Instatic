name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. a new push to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # `bun run build` is `tsc -b && vite build` — typecheck and bundle in one.
      - name: Build
        run: bun run build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

# NOTE: The Playwright E2E suite runs in its own workflow (`.github/workflows/
# e2e.yml`), against the production build and sharded across runners, so it no
# longer suffers the ~45-60 min serial + dev-server-timeout fragility that kept
# it out of CI. It is manual-trigger (`workflow_dispatch`) while the last few
# environment/timing-sensitive specs are stabilized; once reliably green, add a
# `pull_request` trigger there to make it a required check. Run locally with
# `bun run test:e2e` (dev) or `bun run test:e2e:prod` (production build).
